name: pull-request-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Ruff lint
      uses: astral-sh/ruff-action@v3

    - name: Ruff format
      uses: astral-sh/ruff-action@v3
      with:
        args: "format --check"

  test:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for hatch-vcs

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: uv sync

    - name: Install mmcore
      run: uv run mmcore install --test-adapters

    - name: Run tests
      run: make test
